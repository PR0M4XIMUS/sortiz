# sortiz configuration
# Copy this file to ~/.config/sortiz/config.toml and edit as desired.
# All fields are optional — remove a line to use the built-in default.
#
# Color formats accepted:
#   hex:     "#rrggbb"   (e.g. "#ff5555")
#   named:   black, red, green, yellow, blue, magenta, cyan, white,
#            gray, darkgray, lightred, lightgreen, lightyellow,
#            lightblue, lightmagenta, lightcyan
#   transparent: "default"  (lets the terminal background show through)

# ── Colors ────────────────────────────────────────────────────────────────────

[colors]
bar        = "#89b4fa"   # idle bar color              (catppuccin blue)
comparing  = "#fab387"   # two bars being compared     (catppuccin peach)
swapping   = "#f38ba8"   # two bars being swapped      (catppuccin red)
sorted     = "#a6e3a1"   # bars confirmed in place     (catppuccin green)
background = "default"   # background fill             ("default" = transparent)
text       = "#cdd6f4"   # title and status bar text   (catppuccin text)

# ── Display ───────────────────────────────────────────────────────────────────

[display]
# Skip the startup menu and go straight to a bar style.
# Options: "block"  (Unicode block characters with smooth fractional tops)
#          "ascii"  (outlined bars using box-drawing characters)
# Comment out or remove to show the selection menu on startup.
# default_style = "block"

# Columns of empty space between bars. Range: 0–5. Default: 1.
# gap = 1

# Show the algorithm name above the bars. Default: true.
# show_title = true

# Show the step counter below the bars. Default: true.
# show_progress = true

# ── Bar characters ────────────────────────────────────────────────────────────
# Only the first character of each value is used.
# This lets you build completely custom bar styles.

[chars]
# Block mode: single character used to fill the entire bar body.
# block_fill = "█"

# ASCII mode: characters used to draw outlined bars.
# Top cap row:
# ascii_top_left   = "╔"
# ascii_top_mid    = "═"
# ascii_top_right  = "╗"
# Body rows:
# ascii_body_left  = "║"
# ascii_body_fill  = "█"
# ascii_body_right = "║"
# Single-column bars (when bar width is exactly 1):
# ascii_single_top  = "╤"
# ascii_single_body = "│"


# ════════════════════════════════════════════════════════════════════════════
