# ════════════════════════════════════════════════════════════════════════════
# EXAMPLE CUSTOM CHAR STYLES
# ════════════════════════════════════════════════════════════════════════════

# ── Minimal ASCII (pure +/-/| look) ──────────────────────────────────────────
# [display]
# default_style = "ascii"
#
# [chars]
# ascii_top_left   = "+"
# ascii_top_mid    = "-"
# ascii_top_right  = "+"
# ascii_body_left  = "|"
# ascii_body_fill  = "#"
# ascii_body_right = "|"
# ascii_single_top  = "+"
# ascii_single_body = "|"

# ── Hash bars (dense fill, block mode) ───────────────────────────────────────
# [display]
# default_style = "block"
#
# [chars]
# block_fill = "#"
